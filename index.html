<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet 360° Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <script src='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/Leaflet.fullscreen.min.js'></script>
  <link href='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/leaflet.fullscreen.css' rel='stylesheet' />


  <style>
    #map { height: 100vh; }
    .pano-container { width: 400px; height: 250px; }

    .legend {
      background: white;
      padding: 10px;
      line-height: 18px;
      color: #333;
      border-radius: 5px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .legend i {
      width: 14px;
      height: 14px;
      float: left;
      margin-right: 8px;
      opacity: 0.9;
    }

    .map-title {
      background: white;
      padding: 8px 14px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 5px;
      width: 50%;  
      max-width: 500px;  
      min-width: 250px; 
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .map-subtitle {
      font-size: 13px;
      font-weight: normal;
      margin-top: 2px;
      color: #444;
    }

    .leaflet-top.leaflet-left .map-title {
      position: absolute;
      left: 100%;
      top: 10px;
      z-index: 500;
      pointer-events: none;
  }

    .leaflet-popup-pane {
      z-index: 90000 !important;
  }  

    .map-title {
    position: relative;
    z-index: 1;
  }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- IMPORTANT: Only load script.js -->
  <script src="script_online.js"></script>
</body>
</html>
